# AI知识库系统 - Docker Compose 生产环境配置
# 使用方法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  backend:
    # 生产环境使用优化后的镜像
    image: ${IMAGE_REGISTRY:-}/ai-knowledge-base-backend:${IMAGE_TAG:-latest}
    container_name: ai-knowledge-base-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"  # 仅本地暴露，外部通过 Nginx 访问
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-large-zh}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-500}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # 生产环境特殊配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKERS=${WORKERS:-4}
      - WORKER_CLASS=${WORKER_CLASS:-uvicorn.workers.UvicornWorker}
    volumes:
      - ../../uploads:/app/uploads
      - ../../data:/app/data
      - ../../models:/app/models:ro
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: ${IMAGE_REGISTRY:-}/ai-knowledge-base-frontend:${IMAGE_TAG:-latest}
    container_name: ai-knowledge-base-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"  # 仅本地暴露，外部通过 Nginx 访问
    depends_on:
      - backend
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ai-knowledge-base-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: ai-knowledge-base-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:6333/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ========== PostgreSQL 数据库 (可选，生产推荐使用独立数据库) ==========
  postgres:
    image: postgres:15-alpine
    container_name: ai-knowledge-base-postgres
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ========== Nginx 反向代理 ==========
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-knowledge-base-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ai-knowledge-base
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ai-knowledge-base:
    driver: bridge

volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  postgres_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
