# AI知识库系统 - Helm Chart 配置

# ========== 全局配置 ==========
global:
  imageRegistry: docker.io
  imagePullSecrets: []
  storageClass: ""

# ========== Backend 配置 ==========
backend:
  enabled: true
  replicaCount: 2

  image:
    repository: ai-knowledge-base-backend
    pullPolicy: IfNotPresent
    tag: "v0.2.0"

  service:
    type: ClusterIP
    port: 8000
    annotations: {}

  # 资源配置
  resources:
    limits:
      cpu: 4
      memory: 8Gi
    requests:
      cpu: 1
      memory: 2Gi

  # 健康检查
  livenessProbe:
    httpGet:
      path: /api/health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # 挂载卷
  volumes:
    - name: uploads
      persistentVolumeClaim:
        claimName: ai-knowledge-base-uploads
    - name: models
      persistentVolumeClaim:
        claimName: ai-knowledge-base-models
      readOnly: true

  volumeMounts:
    uploads: /app/uploads
    models: /app/models

  # 环境变量配置
  env:
    LOG_LEVEL: INFO
    WORKERS: "4"
    WORKER_CLASS: uvicorn.workers.UvicornWorker
    MAX_UPLOAD_SIZE: "500"
    OPENAI_MODEL: gpt-4
    EMBEDDING_MODEL: bge-large-zh

  # Ingress 配置
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "500m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    hosts:
      - host: ai-knowledge.local
        paths:
          - path: /api
            pathType: Prefix
            service: backend
            port: 8000

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ========== Frontend 配置 ==========
frontend:
  enabled: true
  replicaCount: 2

  image:
    repository: ai-knowledge-base-frontend
    pullPolicy: IfNotPresent
    tag: "v0.2.0"

  service:
    type: ClusterIP
    port: 80
    annotations: {}

  resources:
    limits:
      cpu: 1
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/client-body-buffer-size: "1m"
    hosts:
      - host: ai-knowledge.local
        paths:
          - path: /
            pathType: Prefix
            service: frontend
            port: 80

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

# ========== Redis 配置 ==========
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: ""
  master:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        cpu: 1
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi

# ========== Qdrant 向量数据库配置 ==========
qdrant:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP

# ========== PostgreSQL 配置 (可选) ==========
postgresql:
  enabled: true
  auth:
    database: ai_knowledge_base
    username: ai_kb_user
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

# ========== Ingress-Nginx 配置 ==========
ingress-nginx:
  enabled: true
  controller:
    replicaCount: 2
    service:
      type: LoadBalancer
      annotations:
        # 阿里云 SLB 配置示例
        # service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: intranet
    resources:
      limits:
        cpu: 1
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    config:
      proxy-body-size: "500m"
      proxy-read-timeout: "300"
      proxy-send-timeout: "300"

# ========== PVC 配置 ==========
persistence:
  uploads:
    enabled: true
    storageClass: ""
    size: 50Gi
    accessMode: ReadWriteMany
  models:
    enabled: true
    storageClass: ""
    size: 20Gi
    accessMode: ReadOnlyMany

# ========== 安全配置 ==========
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# ========== 监控配置 ==========
prometheus:
  enabled: false
  serviceMonitor:
    enabled: false

# ========== 通用配置 ==========
nameOverride: ""
fullnameOverride: ""

nodeSelector: {}

tolerations: []

affinity: {}
