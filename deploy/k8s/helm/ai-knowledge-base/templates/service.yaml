{{- /*
Backend Service
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-knowledge-base.fullname" . }}-backend
  labels:
    {{- include "ai-knowledge-base.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-knowledge-base.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend

---

{{- /*
Frontend Service
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-knowledge-base.fullname" . }}-frontend
  labels:
    {{- include "ai-knowledge-base.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-knowledge-base.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
